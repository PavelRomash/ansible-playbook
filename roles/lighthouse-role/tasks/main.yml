- name: Install nginx
  ansible.builtin.apt:
    name: nginx
    state: present
  become: yes

- name: Ensure nginx is started and enabled
  ansible.builtin.service:
    name: nginx
    state: started
    enabled: yes

- name: Install git (required for cloning)
  ansible.builtin.apt:
    name: git
    state: present

- name: Clone Lighthouse repository
  ansible.builtin.git:
    repo: "{{ lighthouse_repo_url }}"
    dest: "{{ lighthouse_dest_dir }}"
    version: "{{ lighthouse_version | default('master') }}"
    force: yes
  notify: restart nginx

- name: Copy nginx virtual host config
  ansible.builtin.template:
    src: lighthouse_nginx.conf.j2
    dest: /etc/nginx/sites-available/lighthouse
  notify: restart nginx

- name: Enable Lighthouse site
  ansible.builtin.file:
    src: /etc/nginx/sites-available/lighthouse
    dest: /etc/nginx/sites-enabled/lighthouse
    state: link
  notify: restart nginx